<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFS Search Animation</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --text: #14213d;
      --muted: #52627a;
      --edge: #c3cde0;
      --node: #dbe4f3;
      --node-border: #6b7d9d;
      --current: #ffb703;
      --visited: #8ecae6;
      --found: #2a9d8f;
      --backtrack: #ef476f;
      --btn: #1d3557;
      --btn-text: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 70%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid #d9e0ef;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(20, 33, 61, 0.08);
      padding: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    button {
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 10px;
      padding: 9px 13px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .target-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
    }

    input {
      width: 68px;
      padding: 8px 10px;
      border: 1px solid #bfd0e9;
      border-radius: 8px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 10px 0 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid #567;
    }

    .board {
      width: 100%;
      overflow: auto;
      border: 1px solid #e2e8f4;
      border-radius: 12px;
      background: #fcfdff;
    }

    svg {
      width: 100%;
      min-width: 720px;
      height: 430px;
      display: block;
    }

    .edge {
      stroke: var(--edge);
      stroke-width: 3;
    }

    .edge.active {
      stroke: var(--current);
      stroke-width: 5;
      transition: stroke 0.2s ease;
    }

    .edge.back {
      stroke: var(--backtrack);
      stroke-width: 5;
      stroke-dasharray: 7 5;
    }

    .node {
      fill: var(--node);
      stroke: var(--node-border);
      stroke-width: 2;
      transition: fill 0.25s ease, transform 0.2s ease;
    }

    .node-label {
      font-size: 20px;
      font-weight: 700;
      fill: #123;
      text-anchor: middle;
      dominant-baseline: middle;
      user-select: none;
    }

    .node.current {
      fill: var(--current);
      transform: scale(1.05);
      transform-origin: center;
    }

    .node.visited {
      fill: var(--visited);
    }

    .node.found {
      fill: var(--found);
    }

    .status {
      margin-top: 10px;
      font-size: 0.96rem;
      color: var(--text);
      font-weight: 600;
      min-height: 24px;
    }

    .order {
      margin-top: 6px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: 22px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Depth-First Search (DFS) Animated Search</h1>
    <p class="subtitle">Graph: A: [B, C], B: [D, E], C: [F], E: [F]. Start node is A.</p>

    <div class="controls">
      <button id="playBtn">Play Animation</button>
      <button id="stepBtn">Step</button>
      <button id="resetBtn">Reset</button>
      <div class="target-wrap">
        <label for="target">Target:</label>
        <input id="target" value="E" maxlength="1" />
      </div>
    </div>

    <div class="legend">
      <span class="chip"><span class="dot" style="background:#ffb703"></span>Current Node</span>
      <span class="chip"><span class="dot" style="background:#8ecae6"></span>Visited</span>
      <span class="chip"><span class="dot" style="background:#2a9d8f"></span>Found Target</span>
      <span class="chip"><span class="dot" style="background:#ef476f"></span>Backtrack Edge</span>
    </div>

    <div class="board">
      <svg viewBox="0 0 900 430" aria-label="DFS Graph">
        <line id="edge-A-B" class="edge" x1="450" y1="70" x2="300" y2="160"></line>
        <line id="edge-A-C" class="edge" x1="450" y1="70" x2="600" y2="160"></line>
        <line id="edge-B-D" class="edge" x1="300" y1="160" x2="210" y2="280"></line>
        <line id="edge-B-E" class="edge" x1="300" y1="160" x2="390" y2="280"></line>
        <line id="edge-C-F" class="edge" x1="600" y1="160" x2="600" y2="280"></line>
        <line id="edge-E-F" class="edge" x1="390" y1="280" x2="600" y2="280"></line>

        <circle id="node-A" class="node" cx="450" cy="70" r="33"></circle>
        <text class="node-label" x="450" y="70">A</text>

        <circle id="node-B" class="node" cx="300" cy="160" r="33"></circle>
        <text class="node-label" x="300" y="160">B</text>

        <circle id="node-C" class="node" cx="600" cy="160" r="33"></circle>
        <text class="node-label" x="600" y="160">C</text>

        <circle id="node-D" class="node" cx="210" cy="280" r="33"></circle>
        <text class="node-label" x="210" y="280">D</text>

        <circle id="node-E" class="node" cx="390" cy="280" r="33"></circle>
        <text class="node-label" x="390" y="280">E</text>

        <circle id="node-F" class="node" cx="600" cy="280" r="33"></circle>
        <text class="node-label" x="600" y="280">F</text>
      </svg>
    </div>

    <div id="status" class="status">Ready. Set a target and press Play Animation.</div>
    <div id="order" class="order">Visit order: (none)</div>
  </div>

  <script>
    const graph = {
      A: ["B", "C"],
      B: ["D", "E"],
      C: ["F"],
      D: [],
      E: ["F"],
      F: []
    };

    const start = "A";
    const statusEl = document.getElementById("status");
    const orderEl = document.getElementById("order");
    const targetInput = document.getElementById("target");
    const playBtn = document.getElementById("playBtn");
    const stepBtn = document.getElementById("stepBtn");
    const resetBtn = document.getElementById("resetBtn");

    let steps = [];
    let stepIndex = 0;
    let timer = null;
    let visitOrder = [];

    function nodeEl(name) {
      return document.getElementById(`node-${name}`);
    }

    function edgeEl(from, to) {
      return document.getElementById(`edge-${from}-${to}`) || document.getElementById(`edge-${to}-${from}`);
    }

    function clearClasses() {
      ["A", "B", "C", "D", "E", "F"].forEach((n) => {
        nodeEl(n).classList.remove("current", "visited", "found");
      });
      document.querySelectorAll(".edge").forEach((e) => {
        e.classList.remove("active", "back");
      });
    }

    function buildSteps(target) {
      const visited = new Set();
      const out = [];
      let found = false;

      function dfs(node, parent = null) {
        if (found || visited.has(node)) return;
        visited.add(node);
        out.push({ type: "visit", node, parent });
        if (node === target) {
          out.push({ type: "found", node });
          found = true;
          return;
        }
        for (const neighbor of graph[node] || []) {
          out.push({ type: "check", from: node, to: neighbor, already: visited.has(neighbor) });
          if (!visited.has(neighbor)) {
            dfs(neighbor, node);
            if (found) return;
            out.push({ type: "backtrack", from: neighbor, to: node });
          }
        }
      }

      dfs(start);
      if (!found) out.push({ type: "notfound", target });
      return out;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setOrder() {
      orderEl.textContent = `Visit order: ${visitOrder.length ? visitOrder.join(" -> ") : "(none)"}`;
    }

    function applyStep(step) {
      document.querySelectorAll(".edge").forEach((e) => e.classList.remove("active", "back"));

      if (step.type === "visit") {
        nodeEl(step.node).classList.add("current", "visited");
        if (!visitOrder.includes(step.node)) visitOrder.push(step.node);
        setStatus(`Visiting ${step.node}`);
      }

      if (step.type === "check") {
        const edge = edgeEl(step.from, step.to);
        if (edge) edge.classList.add("active");
        setStatus(step.already
          ? `Checking ${step.from} -> ${step.to}: already visited, skip`
          : `Checking ${step.from} -> ${step.to}: go deeper`);
      }

      if (step.type === "backtrack") {
        const edge = edgeEl(step.from, step.to);
        if (edge) edge.classList.add("back");
        nodeEl(step.from).classList.remove("current");
        nodeEl(step.to).classList.add("current");
        setStatus(`Backtracking: ${step.from} -> ${step.to}`);
      }

      if (step.type === "found") {
        nodeEl(step.node).classList.add("found");
        setStatus(`Target found: ${step.node}`);
      }

      if (step.type === "notfound") {
        setStatus(`Target "${step.target}" not found from start node ${start}`);
      }

      setOrder();
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function reset() {
      stopTimer();
      clearClasses();
      stepIndex = 0;
      visitOrder = [];
      setOrder();
      setStatus("Ready. Set a target and press Play Animation.");
    }

    function initSteps() {
      const target = (targetInput.value || "").toUpperCase().trim();
      steps = buildSteps(target);
      stepIndex = 0;
      visitOrder = [];
      clearClasses();
      setOrder();
      setStatus(`Prepared DFS search for target "${target || "(empty)"}"`);
    }

    function stepForward() {
      if (stepIndex >= steps.length) {
        stopTimer();
        return;
      }
      applyStep(steps[stepIndex]);
      stepIndex += 1;
      if (stepIndex >= steps.length) stopTimer();
    }

    playBtn.addEventListener("click", () => {
      stopTimer();
      initSteps();
      timer = setInterval(stepForward, 900);
    });

    stepBtn.addEventListener("click", () => {
      if (stepIndex === 0 || stepIndex >= steps.length) initSteps();
      stepForward();
    });

    resetBtn.addEventListener("click", reset);
    targetInput.addEventListener("input", () => {
      targetInput.value = targetInput.value.toUpperCase();
    });

    reset();
  </script>
</body>
</html>
